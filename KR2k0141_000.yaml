body:
  text: 真臘風土記地理類十外紀之屬提要臣等謹案真臘風土記一卷元周達觀撰達觀溫州人真臘本南海中小國為扶南之屬其後漸以強盛自隋書始見于外國傳唐宋二史並皆紀録而朝貢不常至故所載風土方物往往踈略不備元成宗元貞元年乙未遣使招諭其國達觀隨行至大德元年丁酉乃歸首尾三年諳悉其俗因記所聞見為此書凡四十則文義頗為賅贍惟第三十六則內記瀆倫神譴一事不以為天道之常而歸功于佛則所見殊陋然元史不立真臘傳得此而本末詳具猶可以補其佚闕是固宜存備參訂作職方之外紀者矣達觀作是書既成以示吾衍衍為題詩推挹甚至見衍所作竹素山房詩集中蓋衍亦服其敘述之工云乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書真臘風土記元周達觀撰總敘真臘國或稱占臘其國自稱曰甘孛智今聖朝按西番經名其國曰澉浦只蓋亦甘孛智之近音也自溫州開洋行丁未針厯閩廣海外諸州港口過七洲洋經交趾洋到占城又自占城順風可半月到真蒲乃其境也又自真蒲行坤申針過崑崙洋入港港凡數十惟第四港可入其餘悉以沙淺故不通巨舟然而彌望皆修藤古木黃沙白葦倉卒未易辨認故舟人以尋港為難事自港口北行順水可半月抵其地曰查南乃其屬郡也又自查南換小舟順水可十餘日過半路村佛村渡淡洋可抵其地曰干傍取城五十里按諸番志稱其地廣七千里其國北抵占城半月路西南距暹羅半月程南距番禺十日程其東則大海也舊為通商來往之國聖朝誕膺天命奄有四海索多元帥之置省占城也嘗遣一虎符百戶一金牌千戶同到本國竟為拘執不返元貞之乙未六月聖天子遣使招諭俾余從行以次年丙申二月離明州二十日自溫州港口開洋三月十五日抵占城中途逆風不利秋七月始至遂得臣服至大德丁酉六月回舟八月十二日抵四明泊岸其風土國事之詳雖不能盡知然其大略亦可見矣城郭州城周圍可二十里有五門門各兩重惟東向開二門餘向皆一門城之外巨濠濠之外皆通衢大橋橋之兩傍各有石神五十四枚如石將軍之狀甚巨而獰五門皆相似橋之闌皆石為之鑿為蛇形蛇皆九頭五十四神皆以手拔蛇有不容其走逸之勢城門之上有大石佛頭五面向西方中置其一飾之以金門之兩傍鑿石為象形城皆疊石為之可二丈石甚周密堅固且不生繁草却無女墻城之上間或種桄榔木比比皆空屋其內向如坡子厚可十餘丈坡上皆有大門夜閉早開亦有監門者惟狗不許入門其城甚方整四方各有石塔一座曾受斬趾刑人亦不許入門當國之中有金塔一座傍有石塔二十餘座石屋百餘間東向金橋一所金獅子二枚列於橋之左右金佛八身列於石屋之下金塔至北可一里許有銅塔一座比金塔更髙望之鬱然其下亦有石屋十數間又其北一里許則國主之廬也其寢室又有金塔一座焉所以舶商自來有富貴真臘之褒者想為此也石塔出南門外半里餘俗傳魯般一夜造成魯般墓在南門外一里許周圍可十里石屋數百間東池在城東十里周圍可百里中有石塔石屋塔之中有卧銅佛一身臍中常有水流出北池在城北五里中有金方塔一座石屋數十間金獅子金佛銅象銅牛銅馬之屬皆有之宫室國宫及官舍府第皆面東國宫在金塔金橋之北近門周圍可五六里其正室之瓦以鉛為之餘皆土瓦黃色橋柱甚巨皆雕畫佛形屋頭壯觀修廊復道突兀參差稍有規模其蒞事處有金忩櫺左右方柱上有鏡約有四五十面列放於忩之旁其下為象形聞內中多有竒處防禁甚嚴不可得而見也其內中金塔國主夜則卧其上土人皆謂塔之中有九頭蛇精乃一國之土地主也係女身每夜則見國主則先與之同寢交媾雖其妻亦不敢入二鼓乃出方可與妻妾同睡若此精一夜不見則番王死期至矣若番王一夜不往則必獲災禍其次如國戚大臣等屋制度廣袤與常人家迥别周圍皆用草蓋獨家廟及正寢二處許用瓦亦各隨其官之等級以為屋室廣狹之制其下如百姓之家止草蓋瓦片不敢上屋其廣狹雖隨家之貧富然終不敢效府第制度也服飾自國主以下男女皆椎髻袒裼止以布圍腰出入則加以大布一條纒於小布之上布甚有等級國主所打之布有直金三四兩者極其華麗精美其國中雖自織布暹羅及占城皆有來者往往以來自西洋者為上以其精巧而細樣故人惟國主可打純花布頭戴金冠子如金剛頭上所戴者或有時不戴冠但以線穿香花如茉莉之類周匝於髻間頂上戴大珍珠三斤許手足及諸指上皆帶金鐲指展上皆嵌貓兒眼睛石其下跣足足下及手掌皆以紅藥染赤色出則手持金劒百姓間惟婦女可染手足掌男子不敢也大臣國戚可打踈花布惟官人可打兩頭花布百姓間惟婦人可打之新唐人雖打兩頭花布人亦不敢罪之以其暗丁八殺故也暗丁八殺不識體例也官屬國中亦有丞相將帥司天等官其下各設司吏之屬但名稱不同耳大抵皆國戚為之否則亦納女為嬪其出入儀從亦有等級用金轎扛四金傘柄者為上金轎扛二金傘柄者次之金轎扛一金傘柄者又次之止用一金傘柄者又其次之也其下者止用一銀傘柄者而已亦有用銀轎扛者金傘柄以上官皆呼為巴丁或呼暗丁銀傘柄者呼為厮辣的傘皆用中國紅絹為之其裙直拖地油傘皆以緑絹為之裙却短三教為儒者呼為班詰為僧者呼為苧姑為道者呼為八思惟班詰不知其所祖亦無所謂學舍講習之處亦難究其所讀何書但見其如常人打布之外於項上挂白線一條以此别其為儒耳由班詰入仕者則為髙上之人項上之線終身不去苧姑削髮穿黃偏袒右肩其下則繫黃布裙跣足寺亦許用瓦蓋中止有一像正如釋迦佛之狀呼為孛賴穿紅塑以泥飾以丹青外此别無像也塔中之佛相貌又别皆以銅鑄成無鐘鼓鐃鈸與幢幡寶蓋之類僧皆茹魚肉惟不飲酒供佛亦用魚肉每日一齋皆取辦於齋主之家寺中不設厨竈所誦之經甚多皆以貝葉疊成極其齊整於上寫黑字既不用筆墨不知其以何物書寫僧亦有用金銀轎扛傘柄者國王有大政亦咨訪之却無尼姑八思惟正如常人打布之外但於頭上戴一紅布或白布如韃靼娘子罟姑之狀而略低亦有宫觀但比之寺院較狹而道教者亦不如僧教之盛耳所供無别像但止一塊石如中國社壇中之石耳亦不知其何所祖也却有女道士宫觀亦得用瓦八思惟不食他人之食亦不令人見食亦不飲酒不曾見其誦經及與人功果之事俗之小兒入學者皆先就僧家教習暨長而還俗其詳莫能考也人物人但知蠻俗人物粗醜而甚黑殊不知居於海島村僻尋常閭巷間者則信然矣至如宫人及南棚南棚乃府第也婦女多有瑩白如玉者蓋以不見天日之光故也大抵一布纒腰之外不以男女皆露出胸酥椎髻跣足雖國主之妻亦只如此國主凡有五妻正室一人四方四人其下嬪婢之屬聞有三五千亦自分等級未嘗輕出戶余每一入內見番主必與正妻同出乃坐正室金窗中諸宫人皆次第列於兩廊窗下徙倚窺視余備獲一見凡人家有女美貌者必召入內其下供內中出入之役者呼為陳家蘭亦不下一二千却皆有丈夫與民間雜處只於𩕄門之前削去其髮如北人開水道之狀塗以銀硃及塗於兩鬢之傍以此為陳家蘭别耳惟此婦可以入內其下餘人不可得而入也內宫之前後有絡繹於道途間尋常婦女椎髻之外别無叉梳頭面之飾但臂中帶金鐲指中帶金指展且陳家蘭及內中諸宫人皆用之男女身上常塗香藥以檀麝等香合成家家皆修佛事國中多有二形人每日以十數成羣行於虗場間常有招徠唐人之意反有厚饋可醜可惡産婦番婦産後即作熱飯抹之以鹽納於陰戶凡一晝夜而除之以此産中無病且收斂常如室女余初聞而詫之深疑其不然既而所泊之家有女育子備知其事且次日即抱嬰兒同往河內澡洗尤所怪見又每見人言番婦多淫産後一兩日即與夫合若丈夫不中所欲即有買臣見棄之事若丈夫適有逺役只可數夜過十數夜其婦必曰我非是鬼如何孤眠淫蕩之心尤切然亦聞有守志者婦女最易老蓋其婚嫁産育既早二三十歲人已如中國四五十人矣室女人家養女其父母必祝之曰願汝有人要將來嫁千百箇丈夫富室之女自七歲至九歲至貧之家則止於十一歲必命僧道去其童身名曰陳毯蓋官司每歲於中國四月內擇一日頒行本國應有養女當陳毯之家先行申報官司官司先給巨燭一條燭間刻畫一處約是夜遇昏點燭至刻畫處則為陳毯時候矣先期一月或半月或十日父母必擇一僧或一道隨其何處寺觀往往亦自有主顧向上好僧皆為官戶富室所先貧者不暇擇也官富之家饋以酒米布帛檳榔銀器之類至有一百擔者直中國白金二三百兩之物少者或三四十擔或一二十擔隨家豐儉所以貧人家至十一歲而始行事者為難辦此物耳亦有捨錢與貧女陳毯者謂之做好事蓋一歲中一僧止可御一女僧既允受更不他許是夜大設飲食鼓樂會親鄰門外縛一髙棚裝塑泥人泥獸之屬于其上或十餘或止三四枚貧家則無之各按故事凡七日而始撤既昏以轎傘鼓樂迎此僧而歸以綵帛結二亭子一則坐女於其中一則僧坐其中不曉其口説何語鼓樂之聲喧闐是夜不禁犯夜聞至期與女俱入房親以手去其童納之酒中或謂父母親鄰各點於額上或謂俱嘗以口或謂僧與女交媾之事或謂無此但不容唐人見之所以莫知其的至天將明時則又以轎傘鼓樂送僧去後當以布帛之類與僧贖身否則此女終為此僧所有不可得而他適也余所見者大德丁酉之四月初六夜也前此父母必與女同寢此後則斥於房外任其所之無復拘束隄防之矣至若嫁娶則雖有納幣之禮不過茍簡從事多有先姦而後娶者其風俗既不以為恥亦不以為怪也陳毯之夜一巷中或至十餘家城中迎僧道者交錯於途路間鼓樂之聲無處無之奴婢人家奴婢皆買野人以充其役多者百餘少者亦有一二十枚除至貧之家則無之蓋野人者山野中之人也自有種類俗呼為撞賊到城中亦不敢出入人之家城間人相罵者一呼之為撞則恨入骨髓其見輕於人如此少壯者一枚可直百布老弱者止三四十布可得秪許於樓下坐卧若執役方許登樓亦必跪膝合掌頂禮而後敢進呼主人為巴駝主母為米巴駝者父也米者母也若有過撻之則俯首受杖略不敢動其牝牡者自相配偶主人終無與之交接之理或唐人到彼久曠者不擇一與之接主人聞之次日不肯與同坐以其曾與野人接故也或與外人交至於有妊養子主人亦不詰問其所從來蓋以其所不齒且利其得子仍可為異日奴婢也或有逃者擒而復得必於面刺以青或於項上帶鐵以錮之亦有帶於臂腿間者語言國中語言自成音聲雖近而占城暹人皆不通話説如以一為梅二為别三為卑四為般五為孛監六為孛監梅七為孛監别八為孛監卑九為孛監般十為答呼父為巴駝叔伯亦呼為巴駝呼母為米姑姨嬸姆以至鄰人之尊年者亦呼為米呼兄為邦姊亦呼為邦呼弟為補溫呼舅為吃賴姑夫亦呼為孛賴大抵多以下字在上如言此人乃張三之弟則曰補溫張三彼人乃李四之舅則曰吃賴李四又如呼中國為備世呼官人為巴丁呼秀才為班詰乃呼中國官人不曰備世巴丁而曰巴丁備世呼中國之秀才不曰備世班詰而曰班詰備世大抵皆如此此其大略耳至若官府則有官府之議論秀才則有秀才之文談僧道自有僧道之語説城市村落言語各自不同亦與中國無異也野人野人有二種有一等通往來話言之野人乃賣與城間為奴之類是也有一等不屬教化不通言語之野人此輩皆無家可居但領其家屬巡行於山頭戴一瓦盆而走遇有野獸以弧矢標槍射之而得乃擊火於石共烹食而去其性甚狠其藥甚毒同黨中常自相殺戮近地亦有種豆䓻木綿花織布為業者布甚粗厚花紋甚别文字尋常文字及官府文書皆以麂鹿皮等物染黑隨其大小濶狹以意裁之用一等粉如中國白堊之類磋為小條子其名為梭拈於手中就皮畫以成字永不脫落用畢則插於耳之上字迹亦可辨認為何人書寫須以濕物揩拭方去大率字樣正如回鶻字凡文書皆自後書向前却不自上書下也余聞之額森哈雅云其字母音聲正與蒙古音相鄰但所不同者三兩字耳初無印信人家告狀亦有書鋪書寫正朔時序每用中國十月為正月是月也名為佳得當國宫之前縛一大棚上可容千餘人盡挂燈毬花朵之屬其對岸逺離二十丈地則以木接續縳成髙棚如造塔撲竿之狀可髙二十餘丈每夜設三四座或五六座裝煙火爆杖於其上此皆諸屬郡及諸府第認直遇夜則請國主出觀點放煙火爆杖煙火雖百里之外皆見之爆杖其大如炮聲震一城其官屬貴戚每人分以巨燭檳榔所費甚夥國主亦請奉使觀焉如是者半月而後止每一月必有一事如四月則拋毬九月則壓獵壓獵者聚一國之衆皆來城中教閲於國宫之前五月則迎佛水聚一國逺近之佛皆送水與國主洗身陸地行舟國主登樓以觀七月則燒稻其時新稻已熟迎於南門外燒之以供佛婦女車象往觀者無數主却不出八月則挨藍挨藍者舞也點差伎樂每日就國宫內挨藍且鬭豬鬭象國主亦請奉使觀焉如是者一旬其餘月分不能詳記也國人亦有通天文者日月薄蝕皆能推算但是大小盡却與中國不同閏歲則彼亦必置閏但只閏九月殊不可曉一夜只分四更每七日一輪亦如中國所謂開閉建除之類番人既無名姓亦不記生日多有以所生日頭為名者有兩日最吉三日平平四日最凶何日可出東方何日可出西方雖婦女皆能算之十二生肖亦與中國同但所呼之名異耳如以馬為卜賽呼雞之聲為欒呼豬之聲為直盧呼牛為箇之類也爭訟民間爭訟雖小事亦必上聞國主初無笞杖之責但聞罰金而已其人大逆重事亦無絞斬之事止於城西門外掘地成坑納罪人於內實以土石堅築而罷其次有斬手足指者有去鼻者但姦與賭無禁姦婦之夫或知之則以兩柴絞姦夫之足痛不可忍竭其資而與之方可獲免然裝局欺騙者亦有之或有死於門首者則自用繩拖置城外野地初無所謂體究檢驗之事人家獲盜亦可施監禁拷掠之刑却有一項可取且如人家失物疑此人為盜不肯招認遂以鍋煎油極熱令此人伸手於中若果偷物則手腐爛否則皮肉如故云番人有法如此又兩家爭訟莫辨曲直國宫之對岸有小石塔十二座令一人各坐一塔中其外兩家自以親屬互相隄防或坐一二日或三四日其無理者必獲證候而出或身上生瘡癤或咳嗽熱證之類有理者略無纎事以此剖判曲直謂之天獄蓋其土地之靈有如此也病癩國人尋常有病多是入水浸浴及頻頻洗頭便自痊可然多病癩者比比道途間土人雖與之同卧同食亦不校或謂彼中風土有此疾曾有國主患此疾故人不之嫌以愚意觀之往往好色之餘便入水澡洗故成此疾聞土人色欲才畢皆入水澡洗其患痢者十死八九亦有貨藥於市者與中國不類不知其為何物更有一等師巫之屬與人行持尤可笑死亡人死無棺止以􅓕席之類蓋之以布其出喪也前亦用旗幟鼓樂之屬又以兩柈炒米繞路拋撒擡至城外僻逺無人之地棄擲而去俟有鷹犬畜類來食頃刻而盡則謂父母有福故獲此報若不食或食而不盡反謂父母有罪而至此今亦漸有焚者往往皆唐人之遺種也父母死别無服制男子則髠其髮女子則於𩕄門翦髮似錢大以此為孝耳國主仍有塔葬埋但不知葬身與葬骨耳耕種大抵一歲中可三四番收種蓋四時常如五六月天且不識霜雪故也其地半年有雨半年絶無自四月至九月每日下雨午後方下淡水洋中水痕髙可七八丈巨樹盡沒僅留一杪耳人家濵水而居者皆移入山後十月至三月點雨絶無洋中僅可通小舟深處不過三五尺人家又復移下耕種者指至何時稻熟是時水可淹至何處隨其地而播種之耕不用牛耒耜鎌鋤之器雖稍相類而制自不同又有一等野田不種常生水髙至一丈而稻亦與之俱髙想别一種也但糞田及種蔬皆不用穢嫌其不潔也唐人到彼皆不與之言及中國糞壅之事恐為所鄙每三兩家共掘地為一坑蓋其草滿則填之又别掘地為之凡登溷既畢必入池洗淨止用左手右手留以拿飰見唐人登厠用紙揩拭者笑之甚至不欲其登門婦女亦有立而溺者可笑可笑山川自入真蒲以來率多平林叢昧長江巨港綿亘數百里古樹修藤森陰蒙翳禽獸之聲雜遝其間至半港而始見有曠田絶無寸木彌望芃芃禾黍而已野牛以千百成羣聚於此地又有竹坡亦綿亘數百里其間竹節相間生刺筍味至苦四畔皆有髙山出産山多異木無木處乃犀象屯聚養育之地珍禽竒獸不計其數細色有翠毛象牙犀角黃臘粗色有降真豆䓻畫黃紫梗大風子油翡翠其得也頗難蓋叢林中有池池中有魚翡翠自林中飛出求魚番人以樹葉蔽身而坐水濱籠一雌以誘之手持小網伺其來則罩有一日獲三五隻有終日全不得者象牙則山僻人家有之每一象死方有二牙舊傳謂每歲一換牙者非也其牙以摽而殺之者上也自死而隨時為人所取者次之死於山中多年者斯為下矣黃臘出於村落朽樹間其一種細腰蜂如螻蟻者番人取而得之每一船可收二三千塊每塊大者三四十斤小者亦不下十八九斤犀角白而帶花者為上黑為下降真生叢林中番人頗費砍斫之勞蓋此乃樹之心耳其外白木可厚八九寸小者亦不下四五寸豆䓻皆野人山上所種畫黃乃一等樹間之脂番人預先一年以刀斫樹滴􅅹其脂至次年而始收紫梗生於一等樹枝間正如桑寄生之狀亦頗難得大風子油乃大樹之子狀如椰子而圓中有子數十枚胡椒間亦有之纒藤而生纍纍如緑草子其生而青者更辣貿易國人交易皆婦人能之所以唐人到彼必先納一婦人者兼亦利其能買賣故也每日一墟自卯至午即罷無居鋪但以蓬席之類鋪於地間各有處聞亦有納官司賃地錢小交關則用米穀及唐貨次則用布若乃大交關則用金銀矣往往土人最朴見唐人頗加敬畏呼之為佛見則伏地頂禮近亦有脫騙欺負唐人由去人之多故也欲得唐貨其地想不出金銀以唐人金銀為第一五色輕縑帛次之其次如真州之錫鑞溫州之漆盤泉州之青瓷器及水銀銀硃紙劄硫黃熖硝檀香白芷麝香麻布黃草布雨傘鐵鍋銅盤水硃桐油箆箕木梳針其粗重則如明州之席甚欲得者則菽麥也然不可將去耳草木惟石榴甘蔗荷花蓮藕芋桃蕉芎與中國同荔枝橘子狀雖同而酸其餘皆中國所未曽見樹木亦甚各别草花更多且香而艷水中之花更有多品皆不知其名至若桃李杏梅松柏杉檜梨棗楊栁桂蘭菊蕊之類皆所無也其中正月亦有荷花飛鳥禽有孔雀翡翠鸚哥乃中國所無餘如鷹鴉鷺鷥雀兒鸕鷀鸛鶴野鴨黃雀等物皆有之所無者喜鵲鴻鴈黃鶯杜宇燕鴿之屬走獸獸有犀象野牛山馬乃中國所無者其餘如虎豹熊羆野豬麋鹿麞麂猿狐之類甚多所少者獅子猩猩駱駝耳雞鴨牛馬豬羊所不在論也馬甚矮小牛甚多生敢騎死不敢食亦不敢剝其皮聽其腐爛而已以其與人出力故也但以駕車耳在先無鵝近有舟人自中國攜去故得其種鼠有大如貓者又有一等鼠頭腦絶類新生小狗兒蔬菜蔬菜有蔥芥韭茄瓜西瓜冬瓜王瓜莧菜所無者蘿蔔生菜苦蕒菠薐之類瓜茄正月間即有之茄樹有經數年不除者木綿花樹髙可過屋有十餘年不換者不識名之菜甚多水中之菜亦多種魚龍魚鱉惟黑鯉魚最多其他如鯉鯽草魚最多有吐哺魚大者重二斤已上有不識名之魚亦甚多此皆淡水洋中所來者至若海中之魚色色有之鱔魚湖鰻田雞土人不食入夜則縱橫道途間黿鼉大如合苧雖六藏之龜亦充食用查南之蝦重一斤已上真蒲龜腳可長八九寸許鰐魚大者如船有四腳絶類龍特無角耳肚甚脆美蛤蜆螺螄之屬淡水洋中可捧而得獨不見蟹想亦有之而人不食耳醖釀酒有四等第一唐人呼為蜜糖酒用藥麴以蜜及水中半為之其次者土人呼為朋牙四以樹葉為之朋牙四者乃一等樹葉之名也又其次以米或以剩飯為之名曰包稜角蓋包稜角者米也其下有糖鑑酒以糖為之又入港濱水又有茭漿酒蓋有一等茭葉生於水濱其漿可以釀酒鹽醋醬麵醝物國中無禁自真蒲巴澗濱海等處率皆燒山間更有一等石味勝於鹽可琢以成器土人不能為醋羮中欲酸則著以咸平樹葉樹既莢則用莢既生子則用子亦不識合醬為無麥與豆故也亦不曽造麴蓋以蜜水及樹葉釀酒所用者酒藥耳亦如鄉間白酒藥之狀蠶桑土人皆不事蠶桑婦人亦不曉針線縫補之事僅能織木綿布而已亦不能紡但以手理成條無機杼以織但以一頭縳腰一頭搭上梭亦止用一竹管近年暹人來居却以蠶桑為業桑種蠶種皆自暹中來亦無麻苧惟有絡麻暹人却以絲自織皂綾衣著暹婦却能縫補土人打布損破皆倩其補之器用尋常人家房舍之外别無桌凳盂桶之類但作飯則用一瓦釡作羮又用一瓦銚地埋三石為竈以椰子殼為杓盛飯用中國瓦盤或銅盤羮則用樹葉造一小碗雖盛汁亦不漏又以茭葉製一小杓用兜汁入口用畢則棄之雖祭祀神佛亦然又以一錫器或瓦器盛水於傍用以蘸手蓋飯只用手拏其粘於手非此水不能去也飲酒則用鑞注子貧人則用瓦鉢子若府第富室則一一用銀至有用金者國之慶賀多用金為器皿制度形狀又别地下所鋪者明州之草席或有鋪虎豹麂鹿等皮及藤簟者近新置矮桌髙尺許睡只竹席卧於板近有用矮床者往往皆唐人制作也食品用布罩國主內中以銷金縑帛為之皆舶商所饋也稻不用礱止用杵舂碓耳車轎轎之制以一木屈其中兩頭豎起雕刻花樣以金銀裹之所謂金銀轎扛者此也每頭一尺之內釘鉤子以大布一條厚摺用繩繫於兩頭鉤中人挽於布以兩人擡之轎則又加一物如船蓬而更闊飾以五色縑帛四人扛有隨轎而走若逺行亦有騎象騎馬者亦有用車者車之制却與他地一般馬無鞍象無凳可坐舟楫巨舟以硬樹破版為之匠者無鋸但以斧鑿之開成版既費木且費工也凡要木成段亦只以鑿鑿斷起屋亦然船亦用鐵釘上以茭葉蓋覆却以檳榔木破片壓之此船名為新拏用棹所粘之油魚油也所和之灰石灰也小舟却以一巨木鑿成槽以火薰軟用木撑開腹大兩頭尖無蓬可載數人止以棹划之名為皮闌屬郡屬郡九十餘曰真蒲曰查南曰巴澗曰莫良曰八薛曰蒲買曰雉棍曰木津波曰賴敢坑曰八厮里其餘不能悉記各置官屬皆以木排柵為城村落每一村或有寺或有塔人家稍密亦自有鎮守之官名為買節大路上自有歇息如郵亭之類其名為森木近與暹人交兵遂皆成曠地取膽前此於八月內取膽蓋占城王每年索人膽一甕萬千餘枚遇夜則多方令人於城中及村落去處遇有夜行者以繩兜住其頭用小刀於右脅下取去其膽俟數足以饋占城王獨不取唐人之膽蓋因一年取唐人一膽雜於其中遂致甕中之膽俱臭腐而不可用故也近年已除取膽之事另置取膽官屬居北門之裏異事東門之裏有蠻人淫其妹者皮肉相粘不開厯三日不食而俱死余鄉人薛氏居番三十五年矣渠謂兩見此事蓋其用聖佛之靈所以如此澡浴地苦炎熱每日非數次澡洗則不可過入夜亦不免一二次初無浴室盂桶之類但每家須有一池否則兩三家合一池不分男女皆裸形入池惟父母尊年在池則子女卑幼不敢入或卑幼先在池則尊長亦回避之如行輩則無拘也但以左手遮其牝門入水而已或三四日或五六日城中婦女三三五五咸至城外河中漾洗至河邊脫去所纒之布而入水會聚於河者動以千數雖府第婦女亦預焉略不以為恥自踵至頂皆得而見之城外大河無日無之唐人暇日頗以此為遊觀之樂聞亦有就水中偷期者水常溫如湯惟五更則微涼至日出則復溫矣流寓唐人之為水手者利其國中不著衣裳且米糧易求婦女易得屋室易辦器用易足買賣易為往往皆逃逸於彼軍馬軍馬亦是裸體跣足右手執摽槍左手執戰牌别無所謂弓箭炮石甲胄之屬傳聞與暹人相攻皆驅百姓使戰往往亦别無智略謀畫國主出入聞在先國主轍迹未嘗離戶蓋亦防有不測之變也新主乃故國主之壻原以典兵為職其婦翁愛女女密竊金劒以往其夫以故親子不得承襲嘗謀起兵為新主所覺斬其趾而安置於幽室新主身嵌聖鐵縱使刀箭之屬著體不能為害因恃此遂敢出戶余宿留歲餘見其出者四五凡出時諸軍馬擁其前旗幟鼓樂踵其後宫女三五百花布花髻手執巨燭自成一隊雖白日亦照燭又有宫女皆執內中金銀器皿及文飾之具制度迥别不知其何所用又有宫女執摽槍摽牌為內兵又成一隊又有羊車馬車皆以金為飾其諸臣僚國戚皆騎象在前逺望紅涼傘不計其數又其次則國主之妻及妾媵或轎或車或馬或象其銷金涼傘何止百餘其後則是國主立於象上手持寶劒象之牙亦以金套之打銷金白涼傘凡二十餘柄其傘柄皆金為之其四圍擁簇之象甚多又有軍馬護之若遊近處止用金轎子皆以宫女擡之大凡出入必迎小金塔金佛在其前觀者皆當跪地頂禮名為三罷不然則為貌事者所擒不虛釋也每日國主兩次坐衙治事亦無定文及諸臣與百姓之欲見國主者皆列坐地上以俟少頃聞內中隱隱有樂聲在外方吹螺以迎之聞止用金車子來處稍逺須臾見二宫女纎手捲簾而國主乃仗劒立于金窗之中矣臣僚以下皆合掌叩頭螺聲方絶乃許擡頭國主特隨亦就坐坐處有獅子皮一領乃傳國之寶言事既畢國主尋即轉身二宫女復垂其簾諸人各起以此觀之則雖蠻貊之邦未嘗不知有君也真臘風土記
